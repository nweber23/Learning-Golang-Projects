<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Imago — Image Processing</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="styles.css">
</head>
<body>
	<div id="app">
		<!-- Auth Page -->
		<div id="authPage" class="page active">
			<div class="auth-container">
				<div class="auth-content">
					<div class="auth-header">
						<div class="auth-logo">IMAGO</div>
						<p class="auth-subtitle">Professional Image Processing</p>
					</div>

					<div class="auth-card">
						<div class="auth-tabs">
							<button class="auth-tab active" data-tab="login">Sign In</button>
							<button class="auth-tab" data-tab="register">Sign Up</button>
						</div>

						<form id="loginForm" class="auth-form active" data-form="login">
							<div class="form-field">
								<input type="text" id="loginUsername" placeholder="Username" required autofocus>
							</div>
							<div class="form-field">
								<input type="password" id="loginPassword" placeholder="Password" required>
							</div>
							<button type="submit" class="btn-primary">Sign In</button>
							<p class="form-error" id="loginError"></p>
						</form>

						<form id="registerForm" class="auth-form" data-form="register">
							<div class="form-field">
								<input type="text" id="regUsername" placeholder="Choose username" required autofocus>
							</div>
							<div class="form-field">
								<input type="password" id="regPassword" placeholder="Password" required>
							</div>
							<button type="submit" class="btn-primary">Create Account</button>
							<p class="form-error" id="registerError"></p>
						</form>
					</div>
				</div>
			</div>
		</div>

		<!-- Main App -->
		<div id="dashboardPage" class="page">
			<div class="workspace">
				<!-- Sidebar -->
				<aside class="sidebar">
					<div class="sidebar-header">
						<div class="logo">IMG</div>
						<div class="logo-text">IMAGO</div>
					</div>

					<div class="sidebar-user">
						<div class="user-avatar">👤</div>
						<div class="user-info">
							<div class="user-name" id="userDisplay"></div>
							<div class="user-status">Active</div>
						</div>
					</div>

					<nav class="sidebar-nav">
						<button class="nav-item active" data-section="gallery">
							<span class="nav-icon">📸</span>
							<span class="nav-label">Gallery</span>
						</button>
						<button class="nav-item" data-section="upload">
							<span class="nav-icon">⬆️</span>
							<span class="nav-label">Upload</span>
						</button>
					</nav>

					<div class="sidebar-footer">
						<button id="logoutBtn" class="btn-logout">Sign Out</button>
					</div>
				</aside>

				<!-- Main Content -->
				<main class="main-content">
					<!-- Gallery Section -->
					<section id="gallerySection" class="section active">
						<div class="section-header">
							<h1>Your Images</h1>
							<button id="uploadBtnMain" class="btn-primary-compact">Upload New</button>
						</div>

						<div class="gallery-grid" id="gallery">
							<div class="gallery-empty">
								<div class="empty-icon">📸</div>
								<p>No images yet</p>
								<p class="empty-hint">Upload your first image to start</p>
							</div>
						</div>
					</section>

					<!-- Upload Section -->
					<section id="uploadSection" class="section">
						<div class="section-header">
							<h1>Upload Image</h1>
						</div>

						<div class="upload-box">
							<div class="upload-area" id="uploadArea">
								<div class="upload-icon">⬆️</div>
								<p class="upload-title">Drop image here</p>
								<p class="upload-hint">or click to browse • Max 50MB</p>
								<input type="file" id="fileInput" accept="image/*" hidden>
							</div>
							<div class="progress-section" id="progressSection" style="display: none;">
								<div class="progress-bar">
									<div class="progress-fill"></div>
								</div>
								<p class="progress-text" id="progressText">0%</p>
							</div>
							<p class="upload-error" id="uploadError"></p>
						</div>
					</section>
				</main>
			</div>

			<!-- Image Detail Modal -->
			<div id="imageModal" class="modal">
				<div class="modal-overlay"></div>
				<div class="modal-container">
					<div class="modal-header">
						<h2 id="modalImageName"></h2>
						<button class="modal-close">&times;</button>
					</div>

					<div class="modal-body">
						<div class="preview-panel">
							<img id="detailImage" src="" alt="Image" class="image-preview">
							<div class="image-meta">
								<div class="meta-item">
									<span class="meta-label">Size</span>
									<span class="meta-value" id="imageDim"></span>
								</div>
								<div class="meta-item">
									<span class="meta-label">Format</span>
									<span class="meta-value" id="imageFormat"></span>
								</div>
								<div class="meta-item">
									<span class="meta-label">File Size</span>
									<span class="meta-value" id="imageSize"></span>
								</div>
							</div>
						</div>

						<div class="controls-panel">
							<div class="controls-section">
								<h3 class="controls-title">Transform</h3>

								<div class="control-group">
									<label class="control-label">Resize</label>
									<div class="control-inputs">
										<input type="number" id="resizeWidth" placeholder="Width" min="1">
										<span class="input-sep">×</span>
										<input type="number" id="resizeHeight" placeholder="Height" min="1">
									</div>
								</div>

								<div class="control-group">
									<label class="control-label">Rotate</label>
									<select id="rotateSelect">
										<option value="0">No rotation</option>
										<option value="90">90°</option>
										<option value="180">180°</option>
										<option value="270">270°</option>
									</select>
								</div>

								<div class="control-group">
									<label class="control-label">Flip</label>
									<select id="flipSelect">
										<option value="">No flip</option>
										<option value="horizontal">Horizontal</option>
										<option value="vertical">Vertical</option>
									</select>
								</div>

								<div class="control-group">
									<label class="control-label">Format</label>
									<select id="formatSelect">
										<option value="jpeg">JPEG</option>
										<option value="png">PNG</option>
										<option value="webp">WebP</option>
										<option value="gif">GIF</option>
									</select>
								</div>

								<div class="control-group">
									<label class="control-label">Effects</label>
									<div class="checkbox-group">
										<label class="checkbox">
											<input type="checkbox" id="grayscaleCheck">
											<span>Grayscale</span>
										</label>
										<label class="checkbox">
											<input type="checkbox" id="sepiaCheck">
											<span>Sepia</span>
										</label>
									</div>
								</div>
							</div>

							<div class="controls-actions">
								<button id="transformBtn" class="btn-primary-full">Apply Transform</button>
								<button id="deleteBtn" class="btn-danger-full">Delete</button>
							</div>

							<p class="transform-error" id="transformError"></p>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>

	<script src="app.js"></script>
</body>
</html>
